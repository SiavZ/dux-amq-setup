# audit02 Phase 06 — pinned toolchain channel.
#
# `dtolnay/rust-toolchain@<sha>` reads the channel from this file, which
# means upgrading Rust is an explicit, reviewable diff rather than an
# implicit follow-the-`stable`-tag. Edition 2024 only needs ≥1.85.0, but
# several transitive deps require ≥1.88: ratatui 0.30, time 0.3.47,
# darling 0.23, image 0.25.10, instability 0.3.12, home 0.5.12. The
# highest minimum across the resolved graph is 1.88.0.
#
# Bump deliberately when crates require it; do not switch to "stable".
[toolchain]
channel = "1.88.0"
components = ["clippy", "rustfmt"]
