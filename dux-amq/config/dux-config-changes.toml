# Apply these changes to $DUX_HOME/config.toml after first launch creates the
# default file. They wire each provider through the AMQ wrapper script and
# enable session-history fork on resume so deferred tools don't block.
#
# Generate the default first:
#   DUX_HOME=/data/state/dux dux config regenerate --yes
# Then apply the diffs below.

[defaults]
prompt_for_name = true   # branch name == AMQ identity

[providers.claude]
command     = "claude-amq"
resume_args = ["--continue", "--fork-session"]

[providers.codex]
command = "codex-amq"

[providers.gemini]
command = "gemini-amq"
