name: Release

on:
  release:
    types: [created]

# audit02 P2 — never cancel an in-flight release upload; one release per tag.
concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

# audit02 P1-O — workflow-level `permissions:` removed; each job declares
# its own minimum scope below.

jobs:
  build:
    name: Build ${{ matrix.archive }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write    # upload release assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: dux-linux-amd64.tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            archive: dux-linux-arm64.tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: dux-darwin-amd64.tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: dux-darwin-arm64.tar.gz

    steps:
      # audit02 P0-H — third-party actions pinned by commit SHA. The
      # `# vX.Y.Z` comment stays so future updates remain readable, and
      # dependabot (Phase 24) keeps the SHAs fresh.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Toolchain channel comes from rust-toolchain.toml at repo root
      # (audit02 6.2 — deterministic version, no `stable` drift).
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          targets: ${{ matrix.target }}

      # audit02 P1-N — release builds run on push events to release tags
      # only, so populating the cache here is safe.
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          key: ${{ matrix.target }}
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-on-failure: false

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Set version from tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          cargo set-version "$VERSION"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/dux

      - name: Package
        run: tar czf ${{ matrix.archive }} -C target/${{ matrix.target }}/release dux

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} ${{ matrix.archive }}

  upload-install-script:
    name: Upload install script
    runs-on: ubuntu-latest
    permissions:
      contents: write    # upload install.sh asset
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Upload install script
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} install.sh

  update-release-notes:
    name: Append install instructions
    runs-on: ubuntu-latest
    permissions:
      contents: write    # edit release body
    needs: [build, upload-install-script]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Append install section to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract the Install section body from README
          # (between "## Install" and next "## ", excluding both headings)
          install_section=$(sed -n '/^## Install$/,/^## /{/^## /d; p}' README.md | sed -e :a -e '/^\n*$/{$d;N;ba;}')

          # Get current release body
          current_body=$(gh release view "${{ github.event.release.tag_name }}" --json body -q '.body')

          # Split at "Full Changelog" line and reassemble
          if echo "$current_body" | grep -q '^\*\*Full Changelog\*\*'; then
            before=$(echo "$current_body" | sed '/^\*\*Full Changelog\*\*/,$d' | sed -e :a -e '/^\n*$/{$d;N;ba;}')
            changelog_line=$(echo "$current_body" | grep '^\*\*Full Changelog\*\*')
            new_body="${before}

          ---

          ## Installation

          Use any of the following options to install dux on your system:

          ${install_section}

          ${changelog_line}"
          else
            # No Full Changelog line — just append
            new_body="${current_body}

          ---

          ## Installation

          Use any of the following options to install dux on your system:

          ${install_section}"
          fi

          gh release edit "${{ github.event.release.tag_name }}" --notes "$new_body"
